<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Doubles Scorer</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
        }

        .game-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .score-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .score-panel .score {
            font-size: 3em;
            font-weight: bold;
        }

        .score-panel button {
            width: 60px;
            height: 60px;
            font-size: 2em;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .score-panel button:hover {
            transform: scale(1.1);
        }

        .score-panel.left button {
            background: #e74c3c;
            color: #fff;
        }

        .score-panel.right button {
            background: #3498db;
            color: #fff;
        }

        .court-container {
            position: relative;
        }

        .court {
            width: 700px;
            height: 320px;
            background: #2d7a2d;
            position: relative;
            border: 4px solid #fff;
        }

        /* 球网 - 中间垂直线 */
        .net {
            position: absolute;
            left: 50%;
            top: 0;
            width: 0;
            height: 100%;
            border-left: 4px dashed #333;
            transform: translateX(-50%);
        }

        /* 前发球线 - 左侧 */
        .short-service-left {
            position: absolute;
            left: 247px;
            top: 0;
            width: 3px;
            height: 100%;
            background: #fff;
        }

        /* 前发球线 - 右侧 */
        .short-service-right {
            position: absolute;
            right: 247px;
            top: 0;
            width: 3px;
            height: 100%;
            background: #fff;
        }

        /* 双打后发球线 - 左侧 */
        .long-service-left {
            position: absolute;
            left: 40px;
            top: 0;
            width: 3px;
            height: 100%;
            background: #fff;
        }

        /* 双打后发球线 - 右侧 */
        .long-service-right {
            position: absolute;
            right: 40px;
            top: 0;
            width: 3px;
            height: 100%;
            background: #fff;
        }

        /* 中线 - 左半场（从底线到前发球线） */
        .center-line-left {
            position: absolute;
            left: 0;
            top: 50%;
            width: 247px;
            height: 3px;
            background: #fff;
            transform: translateY(-50%);
        }

        /* 中线 - 右半场（从前发球线到底线） */
        .center-line-right {
            position: absolute;
            right: 0;
            top: 50%;
            width: 247px;
            height: 3px;
            background: #fff;
            transform: translateY(-50%);
        }

        /* 单打边线 - 上 */
        .singles-top {
            position: absolute;
            left: 0;
            top: 24px;
            width: 100%;
            height: 3px;
            background: #fff;
        }

        /* 单打边线 - 下 */
        .singles-bottom {
            position: absolute;
            left: 0;
            bottom: 24px;
            width: 100%;
            height: 3px;
            background: #fff;
        }

        /* 球员 */
        .player {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
            transition: all 0.5s ease;
            z-index: 10;
        }

        .player.team-left {
            background: #e74c3c;
        }

        .player.team-right {
            background: #3498db;
        }

        .player.serving {
            box-shadow: 0 0 0 4px #f1c40f, 0 0 20px #f1c40f;
        }

        .player.serving::after {
            content: '🏸';
            position: absolute;
            top: -20px;
            font-size: 16px;
        }

        .serve-indicator {
            color: #f1c40f;
            margin-top: 15px;
            font-size: 14px;
        }

        .change-server-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #9b59b6;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .change-server-btn:hover {
            background: #8e44ad;
        }
    </style>
</head>
<body>
    <h1>🏸 Badminton Doubles Scorer</h1>
    
    <div class="game-container">
        <div class="score-panel left">
            <div>Red Team</div>
            <div class="score" id="scoreLeft">0</div>
            <button onclick="addScore('left')">+</button>
        </div>

        <div class="court-container">
            <div class="court">
                <div class="net"></div>
                <div class="short-service-left"></div>
                <div class="short-service-right"></div>
                <div class="long-service-left"></div>
                <div class="long-service-right"></div>
                <div class="center-line-left"></div>
                <div class="center-line-right"></div>
                <div class="singles-top"></div>
                <div class="singles-bottom"></div>
                
                <div class="player team-left" id="player1">Alice</div>
                <div class="player team-left" id="player2">Bob</div>
                <div class="player team-right" id="player3">Chris</div>
                <div class="player team-right" id="player4">Diana</div>
            </div>
            <div class="serve-indicator" id="serveIndicator">Serving: Red Team - Bob</div>
            <button class="change-server-btn" onclick="changeServer()">Change Server</button>
        </div>

        <div class="score-panel right">
            <div>Blue Team</div>
            <div class="score" id="scoreRight">0</div>
            <button onclick="addScore('right')">+</button>
        </div>
    </div>

    <script>
        let scoreLeft = 0;
        let scoreRight = 0;
        let servingTeam = 'left';
        let servingPlayerIndex = 1; // Bob serves first
        let serveFromRight = false; // Bob serves from bottom (left service court)
        
        // Track each team's positions independently
        let leftTeamPositions = { player1: 'top', player2: 'bottom' }; // Alice top, Bob bottom
        let rightTeamPositions = { player3: 'bottom', player4: 'top' }; // Chris bottom, Diana top

        const players = {
            left: ['Alice', 'Bob'],
            right: ['Chris', 'Diana']
        };

        function updatePlayerPositions() {
            const courtHeight = 320;
            
            // Left team positions based on their stored positions
            if (leftTeamPositions.player1 === 'top') {
                setPlayerPosition('player1', 100, courtHeight * 0.25);
                setPlayerPosition('player2', 100, courtHeight * 0.75);
            } else {
                setPlayerPosition('player1', 100, courtHeight * 0.75);
                setPlayerPosition('player2', 100, courtHeight * 0.25);
            }
            
            // Right team positions based on their stored positions
            if (rightTeamPositions.player3 === 'top') {
                setPlayerPosition('player3', 600, courtHeight * 0.25);
                setPlayerPosition('player4', 600, courtHeight * 0.75);
            } else {
                setPlayerPosition('player3', 600, courtHeight * 0.75);
                setPlayerPosition('player4', 600, courtHeight * 0.25);
            }
            
            updateServingIndicator();
        }
        
        function swapLeftTeam() {
            if (leftTeamPositions.player1 === 'top') {
                leftTeamPositions.player1 = 'bottom';
                leftTeamPositions.player2 = 'top';
            } else {
                leftTeamPositions.player1 = 'top';
                leftTeamPositions.player2 = 'bottom';
            }
        }
        
        function swapRightTeam() {
            if (rightTeamPositions.player3 === 'top') {
                rightTeamPositions.player3 = 'bottom';
                rightTeamPositions.player4 = 'top';
            } else {
                rightTeamPositions.player3 = 'top';
                rightTeamPositions.player4 = 'bottom';
            }
        }

        function setPlayerPosition(playerId, x, y) {
            const player = document.getElementById(playerId);
            player.style.left = (x - 25) + 'px';
            player.style.top = (y - 25) + 'px';
        }

        function updateServingIndicator() {
            document.querySelectorAll('.player').forEach(p => p.classList.remove('serving'));
            
            let serverId;
            const servingScore = servingTeam === 'left' ? scoreLeft : scoreRight;
            const isEvenScore = (servingScore % 2 === 0);
            
            if (servingTeam === 'left') {
                // Left team faces right
                // Even score = BOTTOM serves (their left)
                // Odd score = TOP serves (their right)
                if (isEvenScore) {
                    // Server should be at bottom
                    serverId = leftTeamPositions.player1 === 'bottom' ? 'player1' : 'player2';
                } else {
                    // Server should be at top
                    serverId = leftTeamPositions.player1 === 'top' ? 'player1' : 'player2';
                }
            } else {
                // Right team faces left
                // Even score = TOP serves (their left)
                // Odd score = BOTTOM serves (their right)
                if (isEvenScore) {
                    // Server should be at top
                    serverId = rightTeamPositions.player3 === 'top' ? 'player3' : 'player4';
                } else {
                    // Server should be at bottom
                    serverId = rightTeamPositions.player3 === 'bottom' ? 'player3' : 'player4';
                }
            }
            document.getElementById(serverId).classList.add('serving');
            
            const serverName = serverId === 'player1' ? 'Alice' : serverId === 'player2' ? 'Bob' : serverId === 'player3' ? 'Chris' : 'Diana';
            const teamName = servingTeam === 'left' ? 'Red Team' : 'Blue Team';
            document.getElementById('serveIndicator').textContent = 'Serving: ' + teamName + ' - ' + serverName;
        }

        function addScore(team) {
            if (team === 'left') {
                scoreLeft++;
                if (servingTeam === 'left') {
                    // Serving team scores - only they swap positions
                    swapLeftTeam();
                } else {
                    // Receiving team scores - no swap, just change serve
                    servingTeam = 'left';
                }
            } else {
                scoreRight++;
                if (servingTeam === 'right') {
                    // Serving team scores - only they swap positions
                    swapRightTeam();
                } else {
                    // Receiving team scores - no swap, just change serve
                    servingTeam = 'right';
                }
            }

            document.getElementById('scoreLeft').textContent = scoreLeft;
            document.getElementById('scoreRight').textContent = scoreRight;
            updatePlayerPositions();
        }

        function changeServer() {
            // Toggle serving team
            if (servingTeam === 'left') {
                servingTeam = 'right';
            } else {
                servingTeam = 'left';
            }
            // Server position is automatically determined by score in updateServingIndicator
            updatePlayerPositions();
        }

        // 初始化
        updatePlayerPositions();
    </script>
</body>
</html>
