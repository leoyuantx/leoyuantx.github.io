        // 激活横向闪电宝石 - 只消除整行
        function activateLightningH(triggerRow, triggerCol) {
            const toRemove = new Set(); // 使用Set避免重复
            const bombPositions = []; // 炸弹位置（用于同时触发3x3）
            const rainbowPositions = []; // 彩虹位置（用于同时触发同色消除）
            const processedRows = new Set(); // 已处理的行
            const processedCols = new Set(); // 已处理的列
            const pendingRows = [triggerRow]; // 待处理的行
            const pendingCols = []; // 待处理的列
            
            showSpecialEffect('⚡ 横向闪电！', '#ffd700');
            
            // 先标记闪电位置为已处理（避免重复触发）
            board[triggerRow][triggerCol] = -1;
            
            // 使用队列处理所有连锁的闪电
            while (pendingRows.length > 0 || pendingCols.length > 0) {
                // 处理待处理的行
                while (pendingRows.length > 0) {
                    const row = pendingRows.shift();
                    if (processedRows.has(row)) continue;
                    processedRows.add(row);
                    
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        const gemType = board[row][c];
                        
                        if (gemType === SPECIAL_GEMS.BOMB) {
                            bombPositions.push({ row, col: c });
                            board[row][c] = -1;
                        } else if (gemType === SPECIAL_GEMS.RAINBOW) {
                            rainbowPositions.push({ row, col: c });
                            board[row][c] = -1;
                        } else if (gemType === SPECIAL_GEMS.LIGHTNING_V) {
                            // 纵向闪电，添加到待处理列
                            if (!processedCols.has(c)) {
                                pendingCols.push(c);
                            }
                            board[row][c] = -1;
                        } else if (gemType === SPECIAL_GEMS.LIGHTNING_H) {
                            // 另一个横向闪电在同一行，已经会被消除
                            board[row][c] = -1;
                        }
                        
                        toRemove.add(`${row}-${c}`);
                    }
                }
                
                // 处理待处理的列
                while (pendingCols.length > 0) {
                    const col = pendingCols.shift();
                    if (processedCols.has(col)) continue;
                    processedCols.add(col);
                    
                    for (let r = 0; r < BOARD_SIZE; r++) {
                        const gemType = board[r][col];
                        
                        if (gemType === SPECIAL_GEMS.BOMB) {
                            bombPositions.push({ row: r, col });
                            board[r][col] = -1;
                        } else if (gemType === SPECIAL_GEMS.RAINBOW) {
                            rainbowPositions.push({ row: r, col });
                            board[r][col] = -1;
                        } else if (gemType === SPECIAL_GEMS.LIGHTNING_H) {
                            // 横向闪电，添加到待处理行
                            if (!processedRows.has(r)) {
                                pendingRows.push(r);
                            }
                            board[r][col] = -1;

                            board[r][col] = -1;
                        }
                        
                        toRemove.add(`${r}-${col}`);
                    }
                }
            }
            
            // 同时添加炸弹的3x3区域
            bombPositions.forEach(bomb => {
                for (let row = Math.max(0, bomb.row - 1); row <= Math.min(BOARD_SIZE - 1, bomb.row + 1); row++) {
                    for (let col = Math.max(0, bomb.col - 1); col <= Math.min(BOARD_SIZE - 1, bomb.col + 1); col++) {
                        toRemove.add(`${row}-${col}`);
                    }
                }

                    if (pos.row >= 0 && pos.row < BOARD_SIZE && pos.col >= 0 && pos.col < BOARD_SIZE) {
                        const gemType = board[pos.row][pos.col];
                        if (gemType >= 0 && gemType < GEMS.length) {
                            adjacentGems.push(gemType);

                    }

                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] === targetGemType) {
                            toRemove.add(`${r}-${c}`);
                        }
                    }
                }

            // 转换为数组
            const toRemoveArray = Array.from(toRemove).map(key => {

                return { row, col };

            toRemoveArray.forEach(pos => {

                if (cell) {
                    // 计算延迟：行内格子从中心扩散，其他区域格子稍微延迟

                        delay = Math.abs(pos.col - triggerCol) * 50;

                    setTimeout(((c) => {
                        return () => {

                        };
                    })(cell), delay);
                }
            });
            
            score += toRemoveArray.length * 25;
            
            // 等待动画完成后执行下落和填充
            setTimeout(() => {
                removeMatches(toRemoveArray);
                
                const fallInfo = dropGems();
                
                const newGemPositions = [];

                return;
            }
            
            if (activeToolMode === 'spawnLightningH') {
                activeToolMode = null;
                showSpecialEffect('❌ 已取消横向闪电工具', '#95a5a6');
            } else {
                activeToolMode = 'spawnLightningH';
                showSpecialEffect('⚡ 点击格子生成横向闪电', '#ffd700');
            }
            updateToolDisplay();
        }
        
        // 激活生成纵向闪电工具
        function activateSpawnLightningVTool() {
            if (spawnLightningVCount <= 0) {
                showSpecialEffect('⚠️ 纵向闪电工具已用完！', '#ff9800');
                return;
            }
            
            if (activeToolMode === 'spawnLightningV') {
                activeToolMode = null;
                showSpecialEffect('❌ 已取消纵向闪电工具', '#95a5a6');
            } else {
                activeToolMode = 'spawnLightningV';
                showSpecialEffect('⚡ 点击格子生成纵向闪电', '#ffd700');
            }
            updateToolDisplay();
        }
        
        // 激活生成炸弹工具
        function activateSpawnBombTool() {
            if (spawnBombCount <= 0) {
                showSpecialEffect('⚠️ 炸弹工具已用完！', '#ff9800');
                return;
            }
            
            if (activeToolMode === 'spawnBomb') {
                activeToolMode = null;
                showSpecialEffect('❌ 已取消炸弹工具', '#95a5a6');
            } else {
                activeToolMode = 'spawnBomb';
                showSpecialEffect('💣 点击格子生成炸弹', '#e74c3c');
            }
            updateToolDisplay();
        }
        
        // 激活生成彩虹工具
        function activateSpawnRainbowTool() {
            if (spawnRainbowCount <= 0) {
                showSpecialEffect('⚠️ 彩虹工具已用完！', '#ff9800');
                return;
            }
            
            if (activeToolMode === 'spawnRainbow') {
                activeToolMode = null;
                showSpecialEffect('❌ 已取消彩虹工具', '#95a5a6');
            } else {
                activeToolMode = 'spawnRainbow';
                showSpecialEffect('🌈 点击格子生成彩虹', '#ff6b6b');
            }
            updateToolDisplay();
        }
        
        // 使用消除工具
        function useDestroyTool(row, col) {
            if (destroyToolCount <= 0) return;
            
            const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            if (cell) {
                cell.classList.add('matched');
                createParticles(cell);
            }
            
            board[row][col] = -1;
            destroyToolCount--;
            activeToolMode = null;
            updateToolDisplay();
            
            score += 10;
            updateDisplay();
            
            setTimeout(() => {
                const fallInfo = dropGems();
                const newGemPositions = [];
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] === -1) {
                            newGemPositions.push({ row: r, col: c });
                        }
                    }
                }
                fillEmpty();
                updateBoardWithAnimation(fallInfo, newGemPositions);
                
                setTimeout(() => {
                    processMatches();
                }, 500);
            }, 400);
            
            showSpecialEffect('🎯 消除成功！', '#e74c3c');
        }
        
        // 使用交换工具
        function useSwapTool(row1, col1, row2, col2) {
            if (swapToolCount <= 0) return;
            
            // 直接交换，不检查匹配
            const temp = board[row1][col1];
            board[row1][col1] = board[row2][col2];
            board[row2][col2] = temp;
            
            swapToolCount--;
            activeToolMode = null;
            updateToolDisplay();
            updateBoard();
            
            showSpecialEffect('🔄 交换成功！', '#3498db');
            
            // 检查是否有匹配
            setTimeout(() => {
                processMatches();
            }, 300);
        }
        
        // 使用生成横向闪电工具
        function useSpawnLightningHTool(row, col) {
            if (spawnLightningHCount <= 0) return;
            
            board[row][col] = SPECIAL_GEMS.LIGHTNING_H;
            justPlacedSpecialGem = { row, col }; // 记录刚放置的位置
            
            spawnLightningHCount--;
            activeToolMode = null;
            updateToolDisplay();
            updateBoard();
            
            showSpecialEffect('⚡ 横向闪电已生成！', '#ffd700');
        }
        
        // 使用生成纵向闪电工具
        function useSpawnLightningVTool(row, col) {
            if (spawnLightningVCount <= 0) return;
            
            board[row][col] = SPECIAL_GEMS.LIGHTNING_V;
            justPlacedSpecialGem = { row, col }; // 记录刚放置的位置
            
            spawnLightningVCount--;
            activeToolMode = null;
            updateToolDisplay();
            updateBoard();
            
            showSpecialEffect('⚡ 纵向闪电已生成！', '#ffd700');
        }
        
        // 使用生成炸弹工具
        function useSpawnBombTool(row, col) {
            if (spawnBombCount <= 0) return;
            
            board[row][col] = SPECIAL_GEMS.BOMB;
            justPlacedSpecialGem = { row, col }; // 记录刚放置的位置
            
            spawnBombCount--;
            activeToolMode = null;
            updateToolDisplay();
            updateBoard();
            
            showSpecialEffect('💣 炸弹已生成！', '#e74c3c');
        }
        
        
        // 使用生成彩虹工具
        function useSpawnRainbowTool(row, col) {
            if (spawnRainbowCount <= 0) return;
            
            board[row][col] = SPECIAL_GEMS.RAINBOW;
            justPlacedSpecialGem = { row, col }; // 记录刚放置的位置
            
            spawnRainbowCount--;
            activeToolMode = null;
            updateToolDisplay();
            updateBoard();
            
            showSpecialEffect('🌈 彩虹已生成！', '#ff6b6b');
        }
        
        // 开始新游戏
        function newGame() {
            document.getElementById('gameOver').style.display = 'none';
            window.tempRainbowMode = false;
            
            // 清理任何进行中的拖拽操作
            if (isDragging) {
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', handleMouseUp);
                if (dragElement) {
                    document.body.removeChild(dragElement);
                }
            }
            
            isDragging = false;
            dragStartCell = null;
            dragElement = null;
            dragTarget = null;
            originalRect = null;
            adjacentPositions = [];
            
            initGame();
        }

        // 页面加载完成后初始化游戏
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
