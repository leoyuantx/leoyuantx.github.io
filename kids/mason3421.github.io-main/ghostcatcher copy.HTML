<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Catcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('14235.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        #reaper {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: pointer;
            z-index: 10;
            filter: drop-shadow(0 0 12px rgba(255, 100, 100, 0.6));
            transition: filter 0.15s;
        }

        #reaper:hover {
            filter: drop-shadow(0 0 20px rgba(255, 50, 50, 0.9));
        }

        #happy {
            position: absolute;
            bottom: 10px;
        }

        #ao {
            position: absolute;
            bottom: 10px;
        }

        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            pointer-events: none;
        }

        #sc_field {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: auto;
        }

        #sc_field #sc {
            color: #00e5ff;
            font-family: 'Creepster', cursive;
            font-size: 1.5rem;
        }

        #timer {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: auto;
            transition: color 0.3s, border-color 0.3s;
        }

        #timer #time_left {
            font-family: 'Creepster', cursive;
            font-size: 1.5rem;
            color: #7fff7f;
        }

        #timer.warning {
            color: #ff4444;
            border-color: rgba(255, 68, 68, 0.4);
        }

        #timer.warning #time_left {
            color: #ff4444;
        }

        #hb_frame {
            position: absolute;
            background-color: rgb(0, 238, 255);
            width: 125px;
            height: 125px;
            left: 50%;
        }

        #hb_color_fill {
            position: absolute;
            background-color: rgb(0, 238, 255);
            width: 125px;
            height: 125px;
            left: 50%;
        }

        #info_board {
            position: fixed;
            color: #fff;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(90vw, 560px);
            padding: 48px 40px;
            background: rgba(10, 5, 20, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(150, 100, 255, 0.3);
            border-radius: 24px;
            text-align: center;
            font-size: 1.3rem;
            line-height: 1.6;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(100, 50, 200, 0.15);
            z-index: 100;
        }

        #info_board #info_msg {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            margin-bottom: 24px;
            display: block;
        }

        #info_board h2 {
            font-family: 'Creepster', cursive;
            font-size: 2.5rem;
            color: #c084fc;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(192, 132, 252, 0.4);
        }

        #start_button {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 40px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        #start_button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        #start_button:active {
            transform: translateY(0);
        }
    </style>
</head>
