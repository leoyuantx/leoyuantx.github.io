        function placeShipImage(id, length) {
            const imageContainer = g('board');
            const imageSource = 'images/s'+length+'.png';
            const startingBox = g(id);

            const img = document.createElement('img');
            img.src = imageSource;
            img.alt = 'ship 2';
            img.style.position = 'fixed';

            const rect = startingBox.getBoundingClientRect();
            const x = rect.left;
            const y = rect.top;

            console.log("x:" + x + " - y:" + y);

            img.style.left = `${x}px`;
            img.style.top = `${y+1}px`;
            
            img.style.width = `50px`;
            img.style.height = `${length*50}px`;

            imageContainer.appendChild(img);
            console.log("bbb");
        }

        function onBoxClicked(id) {
            console.log("clicked: " + id);
            
            if (g(id).innerHTML == "O") {

            } else if (g(id).innerHTML == "") {
                console.log("nothing here");
            } 
        }

        function g(id) {
            return document.getElementById(id);
        }
        function placeShips() {
            const [row, col] = getARandomPoint();
            const boxId = "b" + row + "-" + col;
            console.log("first box:" + boxId);
            
            const direction = getRandomDirection();
            const length = getRandomShipLength();
            placeAShip(row, col, direction, length);

        }
        function placeAShip(row, col, direction, length) {
            var boxIds = [];
            boxIds.push("b"+row+"-"+col);
            switch (direction) {
                case 0: // down
                    if (row+length > 10) {
                        console.log("cannot place outside of the board")
                    } else {
                        
                        placeShipImage("b"+row+"-"+col, length);
                        for (let index = 0; index < length; index++) {
                            newRow = row+index;
                            const newBoxId = "b"+newRow+"-"+col;
                            console.log(newBoxId);
                            g(newBoxId).innerHTML = "O";
                            boxIds.push(newBoxId);
                        }
                        console.log(boxIds);
                    }
                    break;
                default:
                break;       
             
            }
            
        }
        function getARandomPoint() {
            const row = Math.floor(Math.random() * 10);
            const col = Math.floor(Math.random() * 10);
            // console.log("ran point " + row + "," + col);
            return [row, col];
        }
        function getRandomDirection() {
            // 0 down
            // 1 up
            // 2 left
            // 3 right
            const direction = Math.floor(Math.random() * 4);
            // console.log("direction:" + direction);
            // return direction
            return 0;
        }
        function getRandomShipLength() {
            const length = Math.floor(Math.random() * 3) + 2;
            console.log("ship length:" + length);
            return length;
        }
