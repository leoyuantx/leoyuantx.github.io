<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What do you know about me?</title>
    <style>
        #question {
            background-color: antiquewhite;
            font-size: 120px;
        }
        .o {
            background-color: beige;
            font-size: 100px;
            width:45%;
            height:30%;
            position:absolute;
        }
        #o1 {
            top:15%;
            left:5%;
        }
        #o2 {
            top:15%;
            left:55%;
        }
        #o3 {
            top:50%;
            left:5%;
        }
        #o4 {
            top:50%;
            left:55%;
        }
    </style>
</head>
<body>
    <div id="question">What is my name?</div>
    <div class="o" id="o1">Leo</div>
    <div class="o" id="o2">Meo</div>
    <div class="o" id="o3">Neo</div>
    <div class="o" id="o4">Jeo</div>
</body>
</html>
