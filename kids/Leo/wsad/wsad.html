<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSAD Control</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }
        #box {
            width: 50px;
            height: 50px;
            background-color: red;
            position: absolute;
            transition: all 0.1s;
        }
    </style>
</head>
<body>
    <div id="box"></div>

    <script>
        const box = document.getElementById('box');
        let posX = 0;
        let posY = 0;

        document.addEventListener('keydown', (event) => {
            console.log(event.key);
            
            switch(event.key) {
                case 'w': // Up
                    posY -= 30;
                    break;
                case 's': // Down
                    posY += 30;
                    break;
                case 'a': // Left
                    posX -= 30;
                    break;
                case 'd': // Right
                    posX += 30;
                    break;
            }
            box.style.transform = `translate(${posX}px, ${posY}px)`;
        });
    </script>
</body>
</html>
