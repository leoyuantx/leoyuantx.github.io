<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Favicon.png">
    <title>Battleship</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        #hello {
            position: relative;
            left: 0;
        }

        /* Game board styling */
        #bboard {
            position: relative;
            margin: 0 auto;
            width: fit-content;
            background: white;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .row {
            display: flex;
            flex-wrap: nowrap;
            width: fit-content;
            margin-bottom: 2px;
        }

        .box {
            width: clamp(30px, 5.5vw, 70px);
            height: clamp(30px, 5.5vw, 70px);
            border: 2px solid #667eea;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1px;
            border-radius: 6px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .box:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .box img {
            max-width: 100%;
            max-height: 100%;
        }

        /* Message display */
        #msg {
            position: fixed;
            top: 80px;
            right: 20px;
            font-size: clamp(0.95rem, 2vw, 1.3rem);
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 280px;
            min-width: 220px;
            text-align: center;
            z-index: 100;
            word-wrap: break-word;
            line-height: 1.6;
            color: #333;
            border-left: 5px solid #667eea;
        }

        /* Start button */
        #sb {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 50;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        #sb:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 12px 28px rgba(245, 87, 108, 0.6);
        }

        #sb:active {
            transform: translateX(-50%) translateY(0);
        }

        /* Difficulty selection */
        #dfl {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            font-size: clamp(0.9rem, 1.8vw, 1.1rem);
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 50;
            max-width: 270px;
            border-top: 4px solid #667eea;
        }

        #dfl > div {
            padding: 0.75rem 1.5rem;
            margin: 0.75rem 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 600;
        }

        #dfl > div:hover {
            transform: translateX(5px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* Result/game over buttons */
        #rg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            font-size: clamp(0.9rem, 1.8vw, 1.1rem);
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 50;
            text-align: center;
            max-width: 90vw;
            border-top: 4px solid #f5576c;
        }

        #rg > div {
            padding: 0.75rem 1.5rem;
            margin: 0.75rem auto;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: inline-block;
            min-width: 180px;
        }

        #rg > div:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        #rg button {
            padding: 0.75rem 1.5rem;
            margin: 0.75rem auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            transition: all 0.3s ease;
            font-weight: 600;
            display: block;
            min-width: 180px;
        }

        #rg button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* Hit/Miss indicator */
        #hitomiss {
            position: fixed;
            top: 290px;
            right: 20px;
            font-size: clamp(0.95rem, 2vw, 1.3rem);
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            z-index: 40;
            max-width: 280px;
            min-width: 220px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: #333;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            body {
                padding: 0.75rem;
            }

            #bboard {
                padding: 0.75rem;
                margin-bottom: 150px;
            }

            .box {
                width: clamp(25px, 6.5vw, 60px);
                height: clamp(25px, 6.5vw, 60px);
                margin: 1px;
            }

            #msg {
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                top: auto;
                bottom: 180px;
                max-width: calc(100vw - 2rem);
                min-width: 180px;
                font-size: clamp(0.85rem, 1.8vw, 1.1rem);
            }

            #hitomiss {
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                top: auto;
                bottom: 100px;
                max-width: calc(100vw - 2rem);
                min-width: 180px;
                font-size: clamp(0.85rem, 1.8vw, 1.1rem);
            }

            #dfl {
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                top: auto;
                bottom: 180px;
                max-width: calc(100vw - 2rem);
            }

            #sb {
                bottom: 20px;
                font-size: clamp(0.9rem, 2vw, 1.3rem);
            }

            #rg {
                bottom: 20px;
                max-width: calc(100vw - 2rem);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
            }

            h1 {
                font-size: clamp(1.2rem, 3vw, 1.8rem);
                margin-bottom: 1rem;
            }

            #bboard {
                padding: 0.5rem;
            }

            .box {
                width: clamp(20px, 7vw, 50px);
                height: clamp(20px, 7vw, 50px);
                margin: 0.5px;
                border-width: 1.5px;
            }

            #msg {
                bottom: 160px;
                max-width: calc(100vw - 1rem);
                min-width: auto;
                padding: 1rem;
                font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            }

            #hitomiss {
                bottom: 90px;
                max-width: calc(100vw - 1rem);
                min-width: auto;
                font-size: clamp(0.8rem, 1.5vw, 0.95rem);
                padding: 0.75rem 1rem;
            }

            #dfl {
                bottom: 160px;
                padding: 1rem;
                max-width: calc(100vw - 1rem);
            }

            #dfl > div {
                padding: 0.6rem 1rem;
                margin: 0.5rem 0;
                font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            }

            #sb {
                bottom: 10px;
                padding: 0.75rem 1.5rem;
                font-size: clamp(0.85rem, 1.8vw, 1.1rem);
            }

            #rg {
                bottom: 10px;
                padding: 1rem;
            }

            #rg > div,
            #rg button {
                padding: 0.6rem 1rem;
                margin: 0.5rem auto;
                font-size: clamp(0.8rem, 1.5vw, 0.95rem);
                min-width: 150px;
            }
        }

        /* Landscape orientation */
        @media (max-height: 600px) {
            #sb {
                bottom: 10px;
            }

            #rg {
                bottom: 10px;
            }

            #msg {
                top: auto;
                bottom: 90px;
            }

            #hitomiss {
                top: auto;
                bottom: 50px;
            }
        }
    </style>

            }

                document.getElementById("msg").innerHTML = "Select Difficulty Level Please"
            } else {

                if (tries == selectedDifficulty) {
                    document.getElementById("msg").innerHTML = "Sorry you lost You haven't bombed all the ships in " + selectedDifficulty +" tries"
                    gameendyoulost = true

                    document.getElementById("rg").style.display = "block"

                    // Select the elements with the class

                    element.style.color = "red";
                    });

                if (document.getElementById(id).innerHTML == "x") {
                    console.log("hit")
                    var oImg = document.createElement("img");
                    oImg.setAttribute('src', 'battleship_explody.png');
                    oImg.setAttribute('alt', 'na');
                    oImg.setAttribute('height', '55px');
                    oImg.setAttribute('width', '55px');
                    document.getElementById(id).innerHTML = ""
                    document.getElementById(id).appendChild(oImg);
                    var audio = new Audio('Explody_Battleship.mp3');
                    audio.play();   
                    document.getElementById("hitomiss").innerHTML = "Hit!";
                    if (findremainingships() == 0) {
                        document.getElementById("msg").innerHTML = "Congratulations you won! You found all the ships in " + tries + " tries"
                        gameendyoulost = true
                        document.getElementById("rg").style.display = "block"

                        // Select the elements with the class
                        const elements = document.querySelectorAll(".box");

                        // Change the color of each element
                        elements.forEach(element => {
                        element.style.color = "green";
                        }); 
                    }
                    
                } else if (document.getElementById(id).innerHTML == "") {
                    console.log("miss");
                    
                    var oImg = document.createElement("img");
                    oImg.setAttribute('src', 'battleship_splash.jpg');
                    oImg.setAttribute('alt', 'na');
                    oImg.setAttribute('height', '55px');
                    oImg.setAttribute('width', '55px');
                    document.getElementById(id).appendChild(oImg);
                    var audio = new Audio('Splash_Battleship.mp3');
                    audio.play();
                    document.getElementById("hitomiss").innerHTML = "Miss!"
                }
            }
          }  
        }

        function findremainingships() {
            var remainingShips = 0
            for (var r=0;r<10;r++) {
                for (var c=0;c<10;c++) {
                    if (document.getElementById("b"+r+c).innerHTML == "x") {
                        remainingShips++
                    }
                }
            }
            return remainingShips
        }

        return Math.floor(Math.random() * (max - min) ) + min;

        function placeShipLength2(){
            var shipHeadRow = 0
            var shipHeadCol = 0
            var direction   = generate_random_direction() 
            if (direction == 0) {
                shipHeadRow = getRndInteger(2,10)
                shipHeadCol = getRndInteger(0,10)
            } else if (direction == 1) {
                shipHeadRow = getRndInteger(0,8)
                shipHeadCol = getRndInteger(0,10)
            } else if (direction == 2) {
                shipHeadRow = getRndInteger(0,10)
                shipHeadCol = getRndInteger(2,10)
            } else if (direction == 3) {
                shipHeadRow = getRndInteger(0,10)
                shipHeadCol = getRndInteger(0,8)
                
            }

            console.log("shipHeadRow: " + shipHeadRow, "shipHeadCol: " + shipHeadCol, "direction: " + direction);
            

            // check 2 boxes
            if (direction == 0) {
                if (document.getElementById("b"+shipHeadRow+shipHeadCol).innerHTML == "x"
                    || document.getElementById("b"+(shipHeadRow-1)+shipHeadCol).innerHTML == "x") {
                    return false;
                }
            } else if (direction == 1) {
                if (document.getElementById("b"+shipHeadRow+shipHeadCol).innerHTML == "x"
                    || document.getElementById("b"+(shipHeadRow+1)+shipHeadCol).innerHTML == "x") {
                    return false;
                    
                }
            } else if(direction == 2) {
                if (document.getElementById("b"+shipHeadRow+shipHeadCol).innerHTML == "x"
                    || document.getElementById("b"+shipHeadRow+(shipHeadCol-1)).innerHTML == "x") {
                    return false;
                }
            } else if(direction == 3) {
                if (document.getElementById("b"+shipHeadRow+shipHeadCol).innerHTML == "x"
                    || document.getElementById("b"+shipHeadRow+(shipHeadCol+1)).innerHTML == "x") {
                    return false;
                }
            }

            document.getElementById("b"+shipHeadRow+shipHeadCol).innerHTML = "x"
            if (direction == 0) {
                document.getElementById("b"+(shipHeadRow-1)+shipHeadCol).innerHTML = "x"
            } else if (direction == 1) {
                document.getElementById("b"+(shipHeadRow+1)+shipHeadCol).innerHTML = "x"
            } else if (direction == 2) {
                document.getElementById("b"+shipHeadRow+(shipHeadCol-1)).innerHTML = "x"
            } else if (direction == 3) {
                document.getElementById("b"+shipHeadRow+(shipHeadCol+1)).innerHTML = "x"
            }
        }
