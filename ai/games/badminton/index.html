<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Court</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .court-container {
            width: 800px;
            height: 400px;
            background-color: #d4a574;
            border: 3px solid #8b4513;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .court {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Net */
        .net {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background-color: #000;
            z-index: 10;
        }

        /* Outer boundary lines */
        .outer-line {
            position: absolute;
            border: 2px solid white;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        /* Inner doubles sidelines */
        .sideline {
            position: absolute;
            width: 2px;
            height: 100%;
            background-color: white;
            left: 10%;
            top: 0;
        }

        .sideline.right {
            left: 90%;
        }

        /* Service lines (parallel to net) */
        .service-line {
            position: absolute;
            width: 80%;
            height: 2px;
            background-color: white;
            left: 10%;
        }

        .service-line.inner {
            top: 33.33%;
        }

        .service-line.inner.bottom {
            top: 66.67%;
        }

        /* Center line */
        .center-line {
            position: absolute;
            width: 2px;
            height: 50%;
            background-color: white;
            left: 50%;
            transform: translateX(-50%);
            top: 25%;
        }

        /* Service boxes - left side */
        .service-box {
            position: absolute;
            width: 40%;
            height: 33.33%;
            border: 2px solid white;
            box-sizing: border-box;
        }

        .service-box.left-top {
            top: 0;
            left: 10%;
        }

        .service-box.left-bottom {
            top: 66.67%;
            left: 10%;
        }

        /* Service boxes - right side */
        .service-box.right-top {
            top: 0;
            right: 10%;
        }

        .service-box.right-bottom {
            top: 66.67%;
            right: 10%;
        }

        /* Labels */
        .label {
            position: absolute;
            font-size: 12px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            font-weight: bold;
        }

        .label.left-top {
            top: 5px;
            left: 15px;
        }

        .label.right-top {
            top: 5px;
            right: 15px;
        }

        .label.left-bottom {
            bottom: 5px;
            left: 15px;
        }

        .label.right-bottom {
            bottom: 5px;
            right: 15px;
        }

        .label.center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="court-container">
        <div class="court">
            <!-- Outer boundary -->
            <div class="outer-line"></div>
            
            <!-- Side boundaries -->
            <div class="sideline"></div>
            <div class="sideline right"></div>
            
            <!-- Service lines (parallel to net) -->
            <div class="service-line inner"></div>
            <div class="service-line inner bottom"></div>
            
            <!-- Center line (perpendicular to net) -->
            <div class="center-line"></div>
            
            <!-- Service boxes -->
            <div class="service-box left-top"></div>
            <div class="service-box left-bottom"></div>
            <div class="service-box right-top"></div>
            <div class="service-box right-bottom"></div>
            
            <!-- Net in the middle -->
            <div class="net"></div>
            
            <!-- Labels -->
            <div class="label left-top">A</div>
            <div class="label right-top">B</div>
            <div class="label left-bottom">C</div>
            <div class="label right-bottom">D</div>
            <div class="label center">NET</div>
        </div>
    </div>
</body>
</html>
